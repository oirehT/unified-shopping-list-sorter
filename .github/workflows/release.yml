name: Release

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish
        required: true
        type: string

jobs:
  release:
    name: Build, attest, and publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify release version
        run: |
          release_version="${RELEASE_TAG#v}"
          RELEASE_VERSION="$release_version" node <<'NODE'
          const fs = require('node:fs');
          const manifest = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const expected = process.env.RELEASE_VERSION;

          if (manifest.version !== expected || pkg.version !== expected) {
            throw new Error(`Expected version ${expected}, got manifest ${manifest.version} and package ${pkg.version}`);
          }
          NODE

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp main.js manifest.json styles.css release/
          (cd release && sha256sum main.js manifest.json styles.css > checksums.txt)
          cat release/checksums.txt

      - name: Attest release assets
        uses: actions/attest@v4
        with:
          subject-checksums: release/checksums.txt

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" \
              release/main.js \
              release/manifest.json \
              release/styles.css \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          else
            gh release create "$RELEASE_TAG" \
              release/main.js \
              release/manifest.json \
              release/styles.css \
              --repo "$GITHUB_REPOSITORY" \
              --title "$RELEASE_TAG" \
              --generate-notes
          fi
